<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Crack Detection</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #fff; color: #000; }
  h1 { font-size: 22px; margin-bottom: 6px; }
  p.sub { color: #555; font-size: 14px; margin-bottom: 24px; }
  input[type=file] { display: block; margin-bottom: 12px; }
  button { padding: 8px 20px; background: #000; color: #fff; border: none; cursor: pointer; font-size: 14px; }
  button:hover { background: #333; }
  img { max-width: 100%; margin-top: 20px; display: block; border: 1px solid #ccc; }
  .result-block { margin-top: 24px; border-top: 2px solid #000; padding-top: 16px; }
  .det { border: 1px solid #ccc; padding: 14px; margin-bottom: 14px; }
  .det h3 { margin: 0 0 6px; font-size: 16px; }
  .det .conf { font-size: 13px; color: #555; margin-bottom: 6px; }
  .det .sev { font-weight: bold; font-size: 13px; margin-bottom: 10px; }
  .det .sev.Critical { color: #cc0000; }
  .det .sev.High     { color: #cc6600; }
  .det .sev.Medium   { color: #888800; }
  .det .sev.Low      { color: #006600; }
  .det h4 { margin: 10px 0 4px; font-size: 13px; }
  .det ul { margin: 0 0 0 18px; padding: 0; font-size: 13px; line-height: 1.7; }
  .urgency { margin-top: 10px; font-size: 13px; font-weight: bold; }
  #status { font-size: 13px; color: #555; margin-top: 8px; }
  #error  { color: red; margin-top: 10px; font-size: 14px; }
  .no-det { font-size: 14px; color: green; margin-top: 16px; }
  hr { border: none; border-top: 1px solid #ddd; margin: 12px 0; }
</style>
</head>
<body>

<h1>AI Crack &amp; Defect Detection</h1>
<p class="sub">Upload a road surface photo. The AI detects potholes, alligator cracks, longitudinal and transverse cracks.</p>

<input type="file" id="file-input" accept="image/*">
<button onclick="analyze()">Analyze</button>
<div id="status"></div>
<div id="error"></div>

<img id="result-img" style="display:none" alt="detection result">

<div class="result-block" id="result-block" style="display:none">
  <div id="summary"></div>
  <div id="det-list"></div>
</div>

<script>
async function analyze() {
  const file = document.getElementById('file-input').files[0];
  if (!file) { alert('Please select an image first.'); return; }

  document.getElementById('status').textContent = 'Analyzing...';
  document.getElementById('error').textContent  = '';
  document.getElementById('result-block').style.display = 'none';
  document.getElementById('result-img').style.display   = 'none';

  const form = new FormData();
  form.append('image', file);

  try {
    const res  = await fetch('/analyze', { method: 'POST', body: form });
    const data = await res.json();

    document.getElementById('status').textContent = '';

    if (data.error) {
      document.getElementById('error').textContent = 'Error: ' + data.error;
      return;
    }

    // Show annotated image
    const img = document.getElementById('result-img');
    img.src = 'data:image/jpeg;base64,' + data.annotated_image;
    img.style.display = 'block';

    // Summary
    document.getElementById('summary').innerHTML =
      '<p><strong>Defects found:</strong> ' + data.num_detections +
      ' &nbsp;|&nbsp; <strong>Overall severity:</strong> ' + data.overall_severity + '</p>';

    // Detection cards
    const listEl = document.getElementById('det-list');
    listEl.innerHTML = '';

    if (!data.detections || data.detections.length === 0) {
      listEl.innerHTML = '<p class="no-det">No defects detected in this image.</p>';
    } else {
      data.detections.forEach(function(det) {
        var causes = (det.causes       || []).map(function(c){ return '<li>'+c+'</li>'; }).join('');
        var prev   = (det.prevention   || []).map(function(p){ return '<li>'+p+'</li>'; }).join('');
        var repair = (det.repair       || []).map(function(r){ return '<li>'+r+'</li>'; }).join('');
        var cons   = (det.consequences || []).map(function(c){ return '<li>'+c+'</li>'; }).join('');

        listEl.innerHTML +=
          '<div class="det">' +
            '<h3>' + (det.full_name || det.class) + '</h3>' +
            '<div class="conf">Confidence: ' + det.confidence + '%</div>' +
            '<div class="sev ' + det.severity + '">Severity: ' + det.severity + '</div>' +
            '<hr>' +
            '<h4>Causes</h4><ul>' + causes + '</ul>' +
            '<h4>Prevention</h4><ul>' + prev + '</ul>' +
            '<h4>Repair</h4><ul>' + repair + '</ul>' +
            '<h4>Consequences if untreated</h4><ul>' + cons + '</ul>' +
            '<div class="urgency">&#9200; ' + det.urgency + '</div>' +
          '</div>';
      });
    }

    document.getElementById('result-block').style.display = 'block';

  } catch(e) {
    document.getElementById('status').textContent = '';
    document.getElementById('error').textContent  = 'Failed — make sure Flask is running: python app.py';
  }
}
</script>

</body>
</html>
